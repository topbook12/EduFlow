<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>অফলাইন মোড - EduFlow</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #f1f5f9;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }
        .container {
            max-width: 480px;
            padding: 40px 24px;
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(20, 184, 166, 0.2);
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.5), 0 8px 10px -6px rgb(0 0 0 / 0.5);
            backdrop-filter: blur(12px);
            margin: 20px;
        }
        .icon-container {
            width: 80px;
            height: 80px;
            background: rgba(20, 184, 166, 0.1);
            border: 2px solid rgba(20, 184, 166, 0.3);
            border-radius: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            position: relative;
        }
        .pulse {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid rgba(20, 184, 166, 0.4);
            animation: ping 2s cubic-bezier(0, 0, 0.2, 1) infinite;
        }
        @keyframes ping {
            75%, 100% {
                transform: scale(1.4);
                opacity: 0;
            }
        }
        .wifi-icon {
            color: #14b8a6;
            width: 40px;
            height: 40px;
        }
        h1 {
            font-size: 24px;
            font-weight: 800;
            margin: 0 0 12px;
            color: #2dd4bf;
        }
        p {
            font-size: 14px;
            line-height: 1.6;
            color: #94a3b8;
            margin: 0 0 28px;
        }
        .btn {
            background: linear-gradient(135deg, #14b8a6 0%, #0d9488 100%);
            color: #0f172a;
            border: none;
            padding: 12px 32px;
            font-size: 14px;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 10px 15px -3px rgba(20, 184, 166, 0.2);
            text-decoration: none;
            display: inline-block;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 20px -3px rgba(20, 184, 166, 0.35);
        }
        .btn:active {
            transform: translateY(0);
        }
        .footer {
            margin-top: 32px;
            font-size: 11px;
            color: #64748b;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon-container">
            <div class="pulse"></div>
            <!-- Hand-drawn sleek SVG Offline Icon -->
            <svg class="wifi-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M18.364 5.636a9 9 0 010 12.728m0 0l-2.829-2.829m2.829 2.829L21 21M15.536 8.464a5 5 0 010 7.072m0 0l-2.829-2.829m-4.243 2.829a4.978 4.978 0 01-1.414-3.536 4.978 4.978 0 011.414-3.536m0 0L5.636 5.636m4.243 4.243a2 2 0 010 2.828m0 0L7.05 15.536M12 12v.01" />
            </svg>
        </div>
        <h1>ইন্টারনেট সংযোগ নেই!</h1>
        <p>আপনার ডিভাইসটি বর্তমানে অফলাইনে রয়েছে। চিন্তার কিছু নেই, আপনি পূর্বে লোড করা আপনার সকল ব্যাচ শিডিউল, নোটিশ এবং স্টাডি মেটেরিয়ালস অফলাইনেও দেখতে পারবেন!</p>
        <button class="btn" onclick="window.location.reload();">আবার চেষ্টা করুন</button>
        <div class="footer">
            EduFlow © 2026 • অফলাইন অ্যাসিস্ট্যান্ট
        </div>
    </div>
</body>
</html>
